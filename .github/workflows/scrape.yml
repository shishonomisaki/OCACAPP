name: Update Knowledge Base

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Clean up old scraped files (keep last 7)
        run: |
          cd data/scraped
          ls -t scraped_*.json 2>/dev/null | tail -n +8 | xargs -r rm --

      - name: Commit and push updated knowledge base
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/knowledge_base.json data/scraped/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update knowledge base [automated]"
            git push
          fi
