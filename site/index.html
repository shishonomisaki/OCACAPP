<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知識問答助手</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Fuse.js — lightweight fuzzy search (6KB gzipped) -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
</head>
<body>

  <div class="header">
    <div class="header-icon">Q</div>
    <div class="header-info">
      <h1>知識問答助手</h1>
      <div class="status">線上</div>
    </div>
  </div>

  <div class="chat-area" id="chat-area"></div>

  <div class="kb-status" id="kb-status"></div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="輸入您的問題..." autocomplete="off">
    <button id="send-btn" aria-label="送出">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13"></path>
        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
      </svg>
    </button>
  </div>

  <script src="js/chatbot.js"></script>
</body>
</html>
